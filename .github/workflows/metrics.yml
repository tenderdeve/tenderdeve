name: Profile Metrics

on:
  schedule:
    - cron: '13 3 * * *'  # 08:43 IST daily — odd minute to dodge cron queue contention
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: false

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tenderdeve
          template: classic
          config_timezone: UTC
          filename: github-metrics.svg
          # Drop "joined GitHub on…" + "followers · following" from header
          base: "activity, community, repositories, metadata"
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          # Skip the action's built-in commit step; we commit manually only on diff
          output_action: none

      - name: Commit if SVG changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-metrics.svg
          if git diff --staged --quiet; then
            echo "No SVG changes."
            exit 0
          fi
          git commit -m "chore(metrics): update profile metrics svg"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push rejected, rebasing (attempt $i)…"
            git pull --rebase origin main
          done
          echo "Push failed after 3 attempts." >&2
          exit 1
