name: Update README

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 3,15 * * *'  # 08:47 + 20:47 IST — odd minute to dodge cron queue contention
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip bot's own commits to prevent infinite loop
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Refresh dynamic sections
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: bash .github/scripts/update-readme.sh

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(readme): refresh dynamic sections"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push rejected, rebasing (attempt $i)…"
            git pull --rebase origin main
          done
          echo "Push failed after 3 attempts." >&2
          exit 1
